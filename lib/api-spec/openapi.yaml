openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: LocalSite API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User operations
  - name: onboarding
    description: Onboarding operations
  - name: admin
    description: Admin operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/signup:
    post:
      operationId: signup
      tags: [auth]
      summary: Sign up a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "200":
          description: Signed up successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current logged in user
      responses:
        "200":
          description: Current user data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard:
    get:
      operationId: getDashboard
      tags: [users]
      summary: Get user dashboard data
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardData"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /subscription/activate:
    post:
      operationId: activateSubscription
      tags: [users]
      summary: Activate subscription (payment simulation)
      responses:
        "200":
          description: Subscription activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardData"
        "400":
          description: Subscription not in ready state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /onboarding/request-website:
    post:
      operationId: requestWebsite
      tags: [onboarding]
      summary: Request a new website to be built
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestWebsiteBody"
      responses:
        "200":
          description: Request submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /onboarding/connect-website:
    post:
      operationId: connectWebsite
      tags: [onboarding]
      summary: Connect an existing website
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectWebsiteBody"
      responses:
        "200":
          description: Connection request submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Admin logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Invalid admin credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/logout:
    post:
      operationId: adminLogout
      tags: [admin]
      summary: Admin logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/users:
    get:
      operationId: adminGetUsers
      tags: [admin]
      summary: Get all users (admin only)
      responses:
        "200":
          description: List of all users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"
        "401":
          description: Not authenticated as admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users/{id}:
    patch:
      operationId: adminUpdateUser
      tags: [admin]
      summary: Update user subscription info (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUpdateUserRequest"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "401":
          description: Not authenticated as admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    SignupRequest:
      type: object
      properties:
        name:
          type: string
        businessName:
          type: string
        phone:
          type: string
        email:
          type: string
        password:
          type: string
      required:
        - name
        - businessName
        - phone
        - email
        - password

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        message:
          type: string
        user:
          $ref: "#/components/schemas/UserProfile"
      required:
        - message
        - user

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        businessName:
          type: string
        phone:
          type: string
        email:
          type: string
        createdAt:
          type: string
      required:
        - id
        - name
        - businessName
        - phone
        - email
        - createdAt

    DashboardData:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        businessName:
          type: string
        email:
          type: string
        phone:
          type: string
        websiteUrl:
          type: string
          nullable: true
        planPrice:
          type: string
          nullable: true
        subscriptionStatus:
          type: string
          nullable: true
        nextPaymentDate:
          type: string
          nullable: true
        requestType:
          type: string
          nullable: true
      required:
        - id
        - name
        - businessName
        - email
        - phone

    RequestWebsiteBody:
      type: object
      properties:
        businessName:
          type: string
      required:
        - businessName

    ConnectWebsiteBody:
      type: object
      properties:
        businessName:
          type: string
        websiteUrl:
          type: string
      required:
        - businessName
        - websiteUrl

    AdminUser:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        businessName:
          type: string
        email:
          type: string
        phone:
          type: string
        websiteUrl:
          type: string
          nullable: true
        planPrice:
          type: string
          nullable: true
        subscriptionStatus:
          type: string
          nullable: true
        nextPaymentDate:
          type: string
          nullable: true
        requestType:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - name
        - businessName
        - email
        - phone
        - createdAt

    AdminUpdateUserRequest:
      type: object
      properties:
        websiteUrl:
          type: string
          nullable: true
        planPrice:
          type: string
          nullable: true
        subscriptionStatus:
          type: string
          nullable: true
        nextPaymentDate:
          type: string
          nullable: true
